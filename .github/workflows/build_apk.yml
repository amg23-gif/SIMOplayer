name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Create google-services.json
        run: |
          mkdir -p android/app
          cat > android/app/google-services.json << 'GSJSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "simo-player-demo",
              "storage_bucket": "simo-player-demo.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": { "package_name": "com.simo.player" }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "AIzaDemo00000000000000000000000000000000" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          GSJSON

      - name: Patch firebase_options.dart
        run: |
          cat > lib/firebase_options.dart << 'DARTEOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, TargetPlatform;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              return android;
            }
            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'AIzaDemo00000000000000000000000000000000',
              appId: '1:000000000000:android:0000000000000000000000',
              messagingSenderId: '000000000000',
              projectId: 'simo-player-demo',
              storageBucket: 'simo-player-demo.appspot.com',
            );
          }
          DARTEOF

      - name: Downgrade Android SDK to 33
        run: |
          sed -i 's/compileSdkVersion 35/compileSdkVersion 33/g' android/app/build.gradle
          sed -i 's/targetSdkVersion 35/targetSdkVersion 33/g' android/app/build.gradle
          grep -E 'compileSdkVersion|targetSdkVersion' android/app/build.gradle

      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: Build Debug APK
        run: flutter build apk --debug --no-shrink
        env:
          FLUTTER_BUILD_NAME: '1.0.0'
          FLUTTER_BUILD_NUMBER: '1'

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/SIMOPlayer-v1.0.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SIMOPlayer-APK
          path: build/app/outputs/flutter-apk/SIMOPlayer-v1.0.0.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "SIMO Player v1.0.0"
          body: |
            ## SIMO Player v1.0.0
            حمّل ملف APK من الأسفل وثبّته على هاتفك مباشرة.
          files: build/app/outputs/flutter-apk/SIMOPlayer-v1.0.0.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
