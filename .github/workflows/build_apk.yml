name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Install Android SDK Platform 34
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -3

      - name: Create google-services.json
        run: |
          mkdir -p android/app
          cat > android/app/google-services.json << 'GSJSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "simo-player-demo",
              "storage_bucket": "simo-player-demo.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                "android_client_info": { "package_name": "com.simo.player" }
              },
              "oauth_client": [],
              "api_key": [{ "current_key": "AIzaDemo00000000000000000000000000000000" }],
              "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
          GSJSON

      - name: Patch firebase_options.dart
        run: |
          cat > lib/firebase_options.dart << 'DARTEOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, TargetPlatform;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform { return android; }
            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'AIzaDemo00000000000000000000000000000000',
              appId: '1:000000000000:android:0000000000000000000000',
              messagingSenderId: '000000000000',
              projectId: 'simo-player-demo',
              storageBucket: 'simo-player-demo.appspot.com',
            );
          }
          DARTEOF

      - name: Create professional app icon
        run: |
          python3 << 'PYEOF'
          import os, struct, zlib, math

          def make_icon(size):
              """Professional blue gradient icon with play button"""
              def chunk(name, data):
                  c = struct.pack('>I', len(data)) + name + data
                  return c + struct.pack('>I', zlib.crc32(name + data) & 0xffffffff)

              sig = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))

              cx, cy = size / 2, size / 2
              r = size / 2
              raw = b''

              for y in range(size):
                  row = b'\x00'
                  for x in range(size):
                      dx, dy = x - cx, y - cy
                      dist = math.sqrt(dx*dx + dy*dy)

                      # Rounded square background
                      corner_r = size * 0.22
                      ax, ay = abs(dx), abs(dy)
                      in_rect = ax <= r - corner_r and ay <= r
                      in_vert = ax <= r and ay <= r - corner_r
                      in_corner = (ax - (r - corner_r))**2 + (ay - (r - corner_r))**2 <= corner_r**2 if ax > r - corner_r and ay > r - corner_r else False
                      in_bg = in_rect or in_vert or in_corner

                      if in_bg:
                          # Blue gradient: top-left bright, bottom-right dark
                          t = (x + y) / (2 * size)
                          rb = int(21 + (13 - 21) * t)
                          gb = int(101 + (71 - 101) * t)
                          bb = int(192 + (161 - 192) * t)

                          # Play triangle
                          margin = size * 0.27
                          tx = x - cx - size * 0.05
                          ty = y - cy
                          h = (size - 2 * margin) * 0.5
                          in_play = (tx >= -h * 0.5 and
                                     ty >= -h and ty <= h and
                                     tx <= h - abs(ty))

                          if in_play:
                              row += bytes([255, 255, 255])
                          else:
                              row += bytes([max(0,rb), max(0,gb), max(0,bb)])
                      else:
                          row += bytes([0, 0, 0])
                  raw += row

              idat = chunk(b'IDAT', zlib.compress(raw, 6))
              iend = chunk(b'IEND', b'')
              return sig + ihdr + idat + iend

          sizes = {
              'mipmap-mdpi': 48, 'mipmap-hdpi': 72,
              'mipmap-xhdpi': 96, 'mipmap-xxhdpi': 144, 'mipmap-xxxhdpi': 192
          }
          base = 'android/app/src/main/res'
          for folder, size in sizes.items():
              path = os.path.join(base, folder)
              os.makedirs(path, exist_ok=True)
              with open(os.path.join(path, 'ic_launcher.png'), 'wb') as f:
                  f.write(make_icon(size))
              print(f"Created {folder}/ic_launcher.png ({size}x{size})")
          PYEOF

      - name: Upgrade AGP + Gradle for Java 17 compat
        run: |
          sed -i "s/com.android.tools.build:gradle:7.4.2/com.android.tools.build:gradle:8.1.4/g" android/build.gradle
          sed -i "s|gradle-7.6.3-all.zip|gradle-8.5-all.zip|g" android/gradle/wrapper/gradle-wrapper.properties
          grep "com.android.tools.build:gradle" android/build.gradle
          grep "distributionUrl" android/gradle/wrapper/gradle-wrapper.properties

      - name: Patch build.gradle for SDK 34 + Java 17
        run: |
          sed -i 's/compileSdkVersion 35/compileSdkVersion 34/g' android/app/build.gradle
          sed -i 's/targetSdkVersion 35/targetSdkVersion 34/g' android/app/build.gradle
          sed -i "s/sourceCompatibility JavaVersion.VERSION_1_8/sourceCompatibility JavaVersion.VERSION_17/g" android/app/build.gradle
          sed -i "s/targetCompatibility JavaVersion.VERSION_1_8/targetCompatibility JavaVersion.VERSION_17/g" android/app/build.gradle
          sed -i "s/jvmTarget = '1.8'/jvmTarget = '17'/g" android/app/build.gradle
          grep -E 'compileSdkVersion|targetSdkVersion|jvmTarget' android/app/build.gradle

      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: Build Debug APK
        run: flutter build apk --debug --no-shrink
        env:
          FLUTTER_BUILD_NAME: '2.0.0'
          FLUTTER_BUILD_NUMBER: '2'

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/SIMOPlayer-v2.0.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SIMOPlayer-APK-v2
          path: build/app/outputs/flutter-apk/SIMOPlayer-v2.0.0.apk
          retention-days: 30
